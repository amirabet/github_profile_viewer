<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pink: {
              400: '#f472b6',
              500: '#ec4899',
              600: '#db2777',
            },
          },
        },
      },
    };
  </script>
  <!-- marked.js for rendering Markdown README -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e1e2e; }
    ::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 4px; }

    /* Accordion chevron animation */
    .accordion-btn[aria-expanded="true"] .chevron { transform: rotate(180deg); }
    .chevron { transition: transform 0.25s ease; }

    /* Contribution grid */
    .contrib-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }

    /* README prose overrides */
    .readme-body h1,
    .readme-body h2,
    .readme-body h3 { color: #f472b6; margin: 1rem 0 0.5rem; font-weight: 700; }
    .readme-body h1 { font-size: 1.5rem; }
    .readme-body h2 { font-size: 1.25rem; border-bottom: 1px solid #374151; padding-bottom: 4px; }
    .readme-body h3 { font-size: 1.1rem; }
    .readme-body p  { margin-bottom: 0.75rem; line-height: 1.7; }
    .readme-body ul,
    .readme-body ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .readme-body ul { list-style: disc; }
    .readme-body ol { list-style: decimal; }
    .readme-body a  { color: #f472b6; text-decoration: underline; }
    .readme-body code { background: #2d2d3f; padding: 1px 5px; border-radius: 4px; font-size: 0.875rem; }
    .readme-body pre { background: #2d2d3f; padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; }
    .readme-body pre code { background: none; padding: 0; }
    .readme-body blockquote { border-left: 3px solid #ec4899; padding-left: 1rem; color: #9ca3af; margin: 1rem 0; }
    .readme-body img { max-width: 100%; border-radius: 6px; }
    .readme-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    .readme-body th,
    .readme-body td { border: 1px solid #374151; padding: 0.5rem 0.75rem; text-align: left; }
    .readme-body th { background: #2d2d3f; color: #f472b6; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased">

  <!-- ─── Header ──────────────────────────────────────────────────── -->
  <header class="border-b border-gray-800 bg-gray-900 sticky top-0 z-40 shadow-md">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
           class="w-8 h-8 text-pink-400 shrink-0">
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577
             0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756
             -1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237
             1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305
             -5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524
             .117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005
             2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118
             3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823
             1.102.823 2.222 0 1.606-.015 2.898-.015 3.293 0 .319.216.694.825.576C20.565
             21.795 24 17.298 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
      <h1 class="text-lg font-bold tracking-tight text-white">
        GitHub <span class="text-pink-400">Profile Viewer</span>
      </h1>
    </div>
  </header>

  <!-- ─── Search Form ─────────────────────────────────────────────── -->
  <main class="max-w-4xl mx-auto px-4 py-8 space-y-6">

    <section class="bg-gray-900 border border-gray-700 rounded-2xl p-6 shadow-lg">
      <h2 class="text-pink-400 font-semibold text-sm uppercase tracking-widest mb-4">Search a GitHub Profile</h2>
      <div class="grid sm:grid-cols-2 gap-4">
        <!-- Username -->
        <div class="flex flex-col gap-1">
          <label for="usernameInput" class="text-xs text-gray-400 font-medium">GitHub Username</label>
          <input
            id="usernameInput"
            type="text"
            placeholder="e.g. torvalds"
            class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500
                   focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
          />
        </div>
        <!-- API Token -->
        <div class="flex flex-col gap-1">
          <label for="tokenInput" class="text-xs text-gray-400 font-medium">
            GitHub Personal Access Token
            <span class="ml-1 text-gray-500">(optional, increases rate limit)</span>
          </label>
          <input
            id="tokenInput"
            type="password"
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500
                   focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
          />
        </div>
      </div>
      <div class="mt-4 flex items-center gap-3">
        <button
          id="searchBtn"
          class="bg-pink-600 hover:bg-pink-500 active:bg-pink-700 text-white font-semibold text-sm
                 px-5 py-2 rounded-lg transition focus:outline-none focus:ring-2 focus:ring-pink-400 focus:ring-offset-2
                 focus:ring-offset-gray-900 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
          </svg>
          View Profile
        </button>
        <p id="errorMsg" class="text-pink-400 text-sm hidden"></p>
      </div>
    </section>

    <!-- ─── Results ─────────────────────────────────────────────────── -->
    <div id="results" class="space-y-4 hidden">

      <!-- ── 1. Profile Info & Achievements ─────────────────────────── -->
      <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-lg overflow-hidden">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left
                 hover:bg-gray-800 transition focus:outline-none focus:ring-inset focus:ring-1 focus:ring-pink-500"
          aria-expanded="true"
          data-target="panel-profile"
        >
          <span class="flex items-center gap-2 font-semibold text-pink-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5.121 17.804A6 6 0 0112 15a6 6 0 016.879 2.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Profile &amp; Info
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-profile" class="px-6 pb-6 pt-2">
          <div id="profileContent" class="flex flex-col sm:flex-row gap-6 items-start">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

      <!-- ── 2. Pinned Repos ─────────────────────────────────────────── -->
      <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-lg overflow-hidden">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left
                 hover:bg-gray-800 transition focus:outline-none focus:ring-inset focus:ring-1 focus:ring-pink-500"
          aria-expanded="true"
          data-target="panel-repos"
        >
          <span class="flex items-center gap-2 font-semibold text-pink-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 7h18M3 12h18M3 17h18"/>
            </svg>
            Pinned Repositories
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-repos" class="px-6 pb-6 pt-2">
          <div id="reposContent" class="grid sm:grid-cols-2 gap-4">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

      <!-- ── 3. README ───────────────────────────────────────────────── -->
      <div id="readmeSection" class="bg-gray-900 border border-gray-700 rounded-2xl shadow-lg overflow-hidden hidden">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left
                 hover:bg-gray-800 transition focus:outline-none focus:ring-inset focus:ring-1 focus:ring-pink-500"
          aria-expanded="true"
          data-target="panel-readme"
        >
          <span class="flex items-center gap-2 font-semibold text-pink-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6M9 16h6M7 4h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"/>
            </svg>
            README
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-readme" class="px-6 pb-6 pt-2">
          <div id="readmeContent" class="readme-body text-gray-300 text-sm leading-relaxed">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

      <!-- ── 4. Contributions ────────────────────────────────────────── -->
      <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-lg overflow-hidden">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left
                 hover:bg-gray-800 transition focus:outline-none focus:ring-inset focus:ring-1 focus:ring-pink-500"
          aria-expanded="true"
          data-target="panel-contrib"
        >
          <span class="flex items-center gap-2 font-semibold text-pink-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Contributions
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-contrib" class="px-6 pb-6 pt-2">
          <div id="contribContent">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

    </div><!-- /results -->

  </main>

  <!-- ─── Footer ──────────────────────────────────────────────────── -->
  <footer class="border-t border-gray-800 mt-12 py-4 text-center text-xs text-gray-600">
    GitHub Profile Viewer &mdash; data via
    <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener"
       class="text-pink-500 hover:underline">GitHub REST &amp; GraphQL API</a>
  </footer>

  <!-- ─── JavaScript ──────────────────────────────────────────────── -->
  <script>
    /* ================================================================
       Accordion behaviour
    ================================================================ */
    document.querySelectorAll('.accordion-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const expanded = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!expanded));
        const panel = document.getElementById(btn.dataset.target);
        if (panel) {
          panel.style.display = expanded ? 'none' : '';
        }
      });
    });

    /* ================================================================
       Helpers
    ================================================================ */
    const $ = id => document.getElementById(id);

    function buildHeaders(token) {
      const headers = { Accept: 'application/vnd.github+json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      return headers;
    }

    function spinner(msg = 'Loading…') {
      return `
        <div class="flex items-center gap-3 text-gray-400 text-sm py-4">
          <svg class="spinner w-5 h-5 text-pink-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
          </svg>
          ${msg}
        </div>`;
    }

    function errorHTML(msg) {
      return `<p class="text-pink-400 text-sm py-4">⚠ ${msg}</p>`;
    }

    function langDot(color) {
      return `<span class="inline-block w-3 h-3 rounded-full mr-1" style="background:${color || '#6e7681'}"></span>`;
    }

    /* ================================================================
       Fetch: User Profile (REST)
    ================================================================ */
    async function fetchProfile(username, headers) {
      const res = await fetch(`https://api.github.com/users/${username}`, { headers });
      if (!res.ok) throw new Error(`User not found (${res.status})`);
      return res.json();
    }

    /* ================================================================
       Fetch: Pinned Repos (GraphQL)
       Falls back to top-starred REST repos when no token is available.
    ================================================================ */
    async function fetchPinnedRepos(username, headers) {
      if (!headers.Authorization) {
        // Without a token GraphQL still works but may be rate-limited;
        // try it anyway.
      }
      const query = `
        query($login: String!) {
          user(login: $login) {
            pinnedItems(first: 6, types: REPOSITORY) {
              nodes {
                ... on Repository {
                  name description url stargazerCount forkCount
                  primaryLanguage { name color }
                  isPrivate
                }
              }
            }
          }
        }`;
      const res = await fetch('https://api.github.com/graphql', {
        method: 'POST',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables: { login: username } }),
      });
      if (!res.ok) throw new Error('GraphQL request failed');
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      const nodes = json.data?.user?.pinnedItems?.nodes ?? [];
      return nodes;
    }

    /* ================================================================
       Fetch: Top repos fallback (REST) — used when GraphQL unavailable
    ================================================================ */
    async function fetchTopRepos(username, headers) {
      const res = await fetch(
        `https://api.github.com/users/${username}/repos?sort=stars&per_page=6&type=public`,
        { headers }
      );
      if (!res.ok) throw new Error(`Could not fetch repos (${res.status})`);
      return res.json();
    }

    /* ================================================================
       Fetch: Profile README (REST)
    ================================================================ */
    async function fetchReadme(username, headers) {
      // The special profile repo has the same name as the username
      const res = await fetch(
        `https://api.github.com/repos/${username}/${username}/readme`,
        { headers: { ...headers, Accept: 'application/vnd.github.raw+json' } }
      );
      if (!res.ok) return null; // README not available
      return res.text();
    }

    /* ================================================================
       Fetch: Contribution Calendar (GraphQL)
    ================================================================ */
    async function fetchContributions(username, headers) {
      const query = `
        query($login: String!) {
          user(login: $login) {
            contributionsCollection {
              contributionCalendar {
                totalContributions
                months { name firstDay totalWeeks }
                weeks {
                  contributionDays {
                    color contributionCount date weekday
                  }
                }
              }
            }
          }
        }`;
      const res = await fetch('https://api.github.com/graphql', {
        method: 'POST',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables: { login: username } }),
      });
      if (!res.ok) throw new Error('Contributions request failed');
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data?.user?.contributionsCollection?.contributionCalendar ?? null;
    }

    /* ================================================================
       Render: Profile
    ================================================================ */
    function renderProfile(user) {
      const joinDate = new Date(user.created_at).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric',
      });

      const stats = [
        { label: 'Repositories', value: user.public_repos },
        { label: 'Followers',    value: user.followers },
        { label: 'Following',    value: user.following },
        { label: 'Gists',        value: user.public_gists },
      ];

      const statCards = stats.map(s => `
        <div class="bg-gray-800 rounded-xl px-4 py-3 text-center min-w-[80px]">
          <p class="text-pink-400 text-xl font-bold">${s.value}</p>
          <p class="text-gray-400 text-xs mt-0.5">${s.label}</p>
        </div>`).join('');

      const location  = user.location  ? `<span>📍 ${user.location}</span>`  : '';
      const company   = user.company   ? `<span>🏢 ${user.company}</span>`   : '';
      const blog      = user.blog      ? `<a href="${user.blog}" target="_blank" rel="noopener"
                                            class="text-pink-400 hover:underline">🔗 ${user.blog}</a>` : '';
      const twitterUn = user.twitter_username
                          ? `<a href="https://twitter.com/${user.twitter_username}" target="_blank"
                                rel="noopener" class="text-pink-400 hover:underline">
                               🐦 @${user.twitter_username}</a>` : '';

      const metaItems = [location, company, blog, twitterUn].filter(Boolean);
      const metaHTML  = metaItems.length
        ? `<div class="flex flex-wrap gap-x-4 gap-y-1 text-sm text-gray-400 mt-2">${metaItems.join('')}</div>` : '';

      return `
        <img src="${user.avatar_url}" alt="${user.login}'s avatar"
             class="w-28 h-28 rounded-full border-4 border-pink-500 shrink-0 object-cover shadow-lg" />
        <div class="flex-1 space-y-3">
          <div>
            <h2 class="text-2xl font-bold text-white">${user.name || user.login}</h2>
            <a href="https://github.com/${user.login}" target="_blank" rel="noopener"
               class="text-pink-400 text-sm hover:underline">@${user.login}</a>
            ${user.hireable ? '<span class="ml-2 text-xs bg-green-900 text-green-300 rounded-full px-2 py-0.5">Available for hire</span>' : ''}
          </div>
          ${user.bio ? `<p class="text-gray-300 text-sm leading-relaxed">${user.bio}</p>` : ''}
          ${metaHTML}
          <p class="text-gray-500 text-xs">Joined ${joinDate}</p>
          <div class="flex flex-wrap gap-3 pt-1">${statCards}</div>
        </div>`;
    }

    /* ================================================================
       Render: Repo Card
    ================================================================ */
    function renderRepoCard(repo, isPinned = true) {
      const name  = repo.name;
      const desc  = repo.description || '<span class="italic text-gray-500">No description</span>';
      const stars = isPinned ? repo.stargazerCount : repo.stargazers_count;
      const forks = isPinned ? repo.forkCount      : repo.forks_count;
      const lang  = isPinned ? repo.primaryLanguage : (repo.language ? { name: repo.language, color: null } : null);
      const url   = isPinned ? repo.url : repo.html_url;

      return `
        <a href="${url}" target="_blank" rel="noopener"
           class="block bg-gray-800 border border-gray-700 rounded-xl p-4 hover:border-pink-500
                  transition group space-y-2">
          <div class="flex items-start justify-between gap-2">
            <p class="font-semibold text-white group-hover:text-pink-400 transition text-sm truncate">${name}</p>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-pink-600 shrink-0 mt-0.5" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 5h14M5 5v14M5 5l14 14"/>
            </svg>
          </div>
          <p class="text-gray-400 text-xs leading-relaxed line-clamp-2">${desc}</p>
          <div class="flex items-center gap-4 text-gray-500 text-xs pt-1">
            ${lang ? `<span>${langDot(lang.color)}${lang.name}</span>` : ''}
            <span>⭐ ${stars}</span>
            <span>🍴 ${forks}</span>
          </div>
        </a>`;
    }

    /* ================================================================
       Render: Contribution Calendar
    ================================================================ */
    function renderContributions(calendar) {
      if (!calendar) return errorHTML('Contribution data not available.');

      const { totalContributions, weeks, months } = calendar;

      // Build month labels row
      const monthLabels = months.map(m =>
        `<span style="grid-column: span ${m.totalWeeks}"
               class="text-gray-500 text-xs truncate">${m.name}</span>`
      ).join('');

      // Build cells
      const cells = weeks.map(week => {
        const dayCells = week.contributionDays.map(day => {
          // GitHub uses hex colors; map to our pink theme or keep theirs
          const baseColor = day.color === '#ebedf0' ? '#1e1e2e'
                          : day.color === '#9be9a8' ? '#4d7c0f'
                          : day.color === '#40c463' ? '#65a30d'
                          : day.color === '#30a14e' ? '#4ade80'
                          : day.color === '#216e39' ? '#166534'
                          : day.color; // keep GitHub default if unexpected

          return `<div class="contrib-cell" title="${day.date}: ${day.contributionCount} contribution(s)"
                       style="background:${baseColor}"></div>`;
        }).join('');
        return `<div class="flex flex-col gap-[2px]">${dayCells}</div>`;
      }).join('');

      return `
        <div class="mb-3 text-sm text-gray-400">
          <span class="text-white font-semibold text-base">${totalContributions.toLocaleString()}</span>
          contributions in the last year
        </div>
        <div class="overflow-x-auto pb-2">
          <div class="inline-grid gap-[2px] mb-1" style="grid-template-columns: repeat(${weeks.length}, 11px)">
            ${monthLabels}
          </div>
          <div class="flex gap-[2px]">${cells}</div>
        </div>
        <div class="flex items-center gap-2 mt-2 text-xs text-gray-500">
          <span>Less</span>
          <div class="w-3 h-3 rounded-sm" style="background:#1e1e2e"></div>
          <div class="w-3 h-3 rounded-sm" style="background:#4d7c0f"></div>
          <div class="w-3 h-3 rounded-sm" style="background:#65a30d"></div>
          <div class="w-3 h-3 rounded-sm" style="background:#4ade80"></div>
          <div class="w-3 h-3 rounded-sm" style="background:#166534"></div>
          <span>More</span>
        </div>`;
    }

    /* ================================================================
       Main: load all sections
    ================================================================ */
    async function loadProfile() {
      const username = $('usernameInput').value.trim();
      const token    = $('tokenInput').value.trim();
      const errMsg   = $('errorMsg');

      errMsg.textContent = '';
      errMsg.classList.add('hidden');

      if (!username) {
        errMsg.textContent = 'Please enter a GitHub username.';
        errMsg.classList.remove('hidden');
        return;
      }

      const btn = $('searchBtn');
      btn.disabled = true;

      const headers = buildHeaders(token);

      // Show results container with spinners
      $('results').classList.remove('hidden');
      $('profileContent').innerHTML  = spinner('Loading profile…');
      $('reposContent').innerHTML    = spinner('Loading repositories…');
      $('readmeContent').innerHTML   = spinner('Loading README…');
      $('contribContent').innerHTML  = spinner('Loading contributions…');
      $('readmeSection').classList.remove('hidden');

      // Ensure all accordion panels are visible
      document.querySelectorAll('.accordion-btn').forEach(b => {
        b.setAttribute('aria-expanded', 'true');
        const panel = document.getElementById(b.dataset.target);
        if (panel) panel.style.display = '';
      });

      // ── Profile ──────────────────────────────────────────────────
      let user;
      try {
        user = await fetchProfile(username, headers);
        $('profileContent').innerHTML = renderProfile(user);
      } catch (err) {
        $('profileContent').innerHTML = errorHTML(err.message);
        btn.disabled = false;
        return; // abort if user not found
      }

      // ── Pinned Repos (GraphQL) → fallback REST ────────────────────
      (async () => {
        try {
          const pinned = await fetchPinnedRepos(username, headers);
          if (pinned.length > 0) {
            $('reposContent').innerHTML = pinned.map(r => renderRepoCard(r, true)).join('');
          } else {
            // No pinned repos — fall back to top-starred
            throw new Error('no pinned');
          }
        } catch {
          try {
            const repos = await fetchTopRepos(username, headers);
            if (repos.length === 0) {
              $('reposContent').innerHTML = '<p class="text-gray-500 text-sm py-4">No public repositories found.</p>';
            } else {
              $('reposContent').innerHTML =
                `<p class="col-span-2 text-gray-500 text-xs mb-2 italic">No pinned repos — showing top starred.</p>` +
                repos.map(r => renderRepoCard(r, false)).join('');
            }
          } catch (err2) {
            $('reposContent').innerHTML = errorHTML(err2.message);
          }
        }
      })();

      // ── README ────────────────────────────────────────────────────
      (async () => {
        try {
          const md = await fetchReadme(username, headers);
          if (!md) {
            $('readmeSection').classList.add('hidden');
          } else {
            $('readmeContent').innerHTML = marked.parse(md);
          }
        } catch {
          $('readmeSection').classList.add('hidden');
        }
      })();

      // ── Contributions (GraphQL — requires token) ──────────────────
      (async () => {
        if (!token) {
          $('contribContent').innerHTML = `
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-gray-400 flex gap-3 items-start">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-pink-400 shrink-0 mt-0.5" fill="none"
                   viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
              </svg>
              <div>
                <p class="font-semibold text-white mb-1">Personal Access Token required</p>
                <p>The GitHub GraphQL API (used to retrieve the contribution calendar) requires authentication.
                   Please add your
                   <a href="https://github.com/settings/tokens" target="_blank" rel="noopener"
                      class="text-pink-400 hover:underline">Personal Access Token</a>
                   in the field above and search again.</p>
              </div>
            </div>`;
          return;
        }
        try {
          const calendar = await fetchContributions(username, headers);
          $('contribContent').innerHTML = renderContributions(calendar);
        } catch (err) {
          $('contribContent').innerHTML = errorHTML(err.message);
        }
      })();

      btn.disabled = false;
    }

    /* ================================================================
       Event listeners
    ================================================================ */
    $('searchBtn').addEventListener('click', loadProfile);
    $('usernameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadProfile();
    });
  </script>
</body>
</html>
