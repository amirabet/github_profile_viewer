<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind.config.js"></script>
  <!-- marked.js for rendering Markdown README -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="text-gray-100 min-h-screen font-sans antialiased" style="background:#040e1e">

  <!-- ─── Globe Background Video ──────────────────────────────────── -->
  <div class="globe-bg">
    <video class="globe-bg-video" width="916" height="918" loop muted playsinline preload="auto" autoplay>
      <source type="video/mp4; codecs=hevc,mp4a.40.2" src="assets/globe-900.hevc.mp4">
      <source type="video/mp4; codecs=avc1.4D401E,mp4a.40.2" src="assets/globe-900.h264.mp4">
    </video>
  </div>

  <!-- ─── Header ──────────────────────────────────────────────────── -->
  <header id="pageHeader" class="border-b border-white/10 sticky top-0 z-40 shadow-md"
          style="background:rgba(4,14,30,0.8);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
           class="w-8 h-8 text-pink-400 shrink-0">
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577
             0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756
             -1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237
             1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305
             -5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524
             .117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005
             2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118
             3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823
             1.102.823 2.222 0 1.606-.015 2.898-.015 3.293 0 .319.216.694.825.576C20.565
             21.795 24 17.298 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
      <h1 class="text-lg font-bold tracking-tight text-white">
        GitHub <span class="text-gray-200">Profile Viewer</span>
      </h1>
    </div>
  </header>

  <!-- ─── Search Form ─────────────────────────────────────────────── -->
  <main class="px-4 py-8 space-y-6">

    <section id="searchSection" class="glass-panel rounded-2xl p-6 shadow-lg">
      <h2 class="text-gray-200 font-semibold text-sm uppercase tracking-widest mb-4">Search a GitHub Profile</h2>
      <div class="grid sm:grid-cols-2 gap-4">
        <!-- Username -->
        <div class="flex flex-col gap-1">
          <label for="usernameInput" class="text-xs text-gray-400 font-medium">GitHub Username</label>
          <input
            id="usernameInput"
            type="text"
            placeholder="e.g. torvalds"
            class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500
                   focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
          />
        </div>
        <!-- API Token -->
        <div class="flex flex-col gap-1">
          <label for="tokenInput" class="text-xs text-gray-400 font-medium">
            GitHub Personal Access Token
            <span class="ml-1 text-gray-500">(optional, increases rate limit)</span>
          </label>
          <input
            id="tokenInput"
            type="password"
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500
                   focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
          />
        </div>
      </div>
      <div class="mt-4 flex items-center gap-3">
        <button
          id="searchBtn"
          class="btn-gradient text-white font-semibold text-sm
                 px-5 py-2 rounded-lg flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
          </svg>
          View Profile
        </button>
        <p id="errorMsg" class="text-pink-400 text-sm hidden"></p>
      </div>
    </section>

    <!-- ─── Results ─────────────────────────────────────────────────── -->
    <div id="results" class="results-panels" style="display:none">

      <!-- ── Results header bar (full width) ────────────────────────── -->
      <div class="full-width-panel flex items-center justify-between py-1">
        <span class="text-xs text-gray-500">
          Viewing: <span id="searchedUsername" class="text-pink-400 font-medium"></span>
        </span>
        <button id="newSearchBtn"
                class="text-xs text-pink-400 hover:text-pink-300 transition underline-offset-2 hover:underline">
          ← New Search
        </button>
      </div>

      <!-- ── 1. Profile Info & Achievements ─────────────────────────── -->
      <div id="profilePanel" class="glass-panel rounded-2xl shadow-lg overflow-hidden">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left transition focus:outline-none"
          aria-expanded="true"
          data-target="panel-profile"
        >
          <span class="flex items-center gap-2 font-semibold text-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5.121 17.804A6 6 0 0112 15a6 6 0 016.879 2.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Profile &amp; Info
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-profile" class="px-6 pb-6 pt-2">
          <div id="profileContent" class="flex flex-col sm:flex-row gap-6 items-start">
            <!-- filled by JS -->
          </div>
          <div id="achievementsContent" class="hidden">
            <!-- filled by JS when achievements are available -->
          </div>
        </div>
      </div>

      <!-- ── 2. Pinned Repos ─────────────────────────────────────────── -->
      <div id="reposPanel" class="glass-panel rounded-2xl shadow-lg overflow-hidden">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left transition focus:outline-none"
          aria-expanded="true"
          data-target="panel-repos"
        >
          <span class="flex items-center gap-2 font-semibold text-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 7h18M3 12h18M3 17h18"/>
            </svg>
            Pinned Repositories
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-repos" class="px-6 pb-6 pt-2">
          <div id="reposContent" class="grid sm:grid-cols-2 gap-4">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

      <!-- ── 3. README ───────────────────────────────────────────────── -->
      <div id="readmeSection" class="glass-panel rounded-2xl shadow-lg overflow-hidden full-width-panel hidden">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left transition focus:outline-none"
          aria-expanded="true"
          data-target="panel-readme"
        >
          <span class="flex items-center gap-2 font-semibold text-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6M9 16h6M7 4h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"/>
            </svg>
            README
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-readme" class="px-6 pb-6 pt-2">
          <div id="readmeContent" class="readme-body text-gray-300 text-sm leading-relaxed">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

      <!-- ── 4. Contributions ────────────────────────────────────────── -->
      <div id="contribPanel" class="glass-panel rounded-2xl shadow-lg overflow-hidden full-width-panel">
        <button
          class="accordion-btn w-full flex items-center justify-between px-6 py-4 text-left transition focus:outline-none"
          aria-expanded="true"
          data-target="panel-contrib"
        >
          <span class="flex items-center gap-2 font-semibold text-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Contributions
          </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="chevron w-5 h-5 text-gray-400" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div id="panel-contrib" class="px-6 pb-6 pt-2">
          <div id="contribContent">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

    </div><!-- /results -->

  </main>

  <!-- ─── Footer ──────────────────────────────────────────────────── -->
  <footer class="border-t border-white/10 mt-4 py-2 text-center text-xs text-gray-600">
    GitHub Profile Viewer &mdash; data via
    <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener"
       class="text-pink-500 hover:underline">GitHub REST &amp; GraphQL API</a>
  </footer>

  <!-- ─── JavaScript ──────────────────────────────────────────────── -->
  <script src="app.js" defer></script>
</body>
</html>
